name: Build & Release

on:
  push:
    tags:
      - 'v*'
    branches: [main, master]
    paths:
      - 'android/**'
      - 'client/**'
      - 'server/**'
      - 'pkg/**'
      - '.github/workflows/build-apk.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK
        run: sdkmanager "ndk;27.2.12479018"

      - name: Install gomobile
        run: |
          go install golang.org/x/mobile/cmd/gomobile@latest
          go install golang.org/x/mobile/cmd/gobind@latest
          gomobile init

      - name: Patch anet (fix go:linkname incompatibility)
        run: |
          cd android/tunnel
          go mod download github.com/wlynxg/anet@v0.0.5
          ANET_DIR=$(go env GOMODCACHE)/github.com/wlynxg/anet@v0.0.5
          PATCH_DIR=/tmp/anet-patched
          cp -r "$ANET_DIR" "$PATCH_DIR"
          chmod -R u+w "$PATCH_DIR"
          sed -i 's|//go:linkname zoneCache net.zoneCache|// patched: removed go:linkname|' "$PATCH_DIR/interface_android.go"
          sed -i 's|//go:linkname zoneCacheX golang.org/x/net/internal/socket.zoneCache|// patched: removed go:linkname|' "$PATCH_DIR/interface_android.go"
          echo "" >> go.mod
          echo "replace github.com/wlynxg/anet => /tmp/anet-patched" >> go.mod

      - name: Build Go tunnel library (.aar)
        run: |
          cd android/tunnel
          go mod tidy
          go get golang.org/x/mobile@latest
          mkdir -p ../app/libs
          gomobile bind -target=android/arm64,android/arm -androidapi 26 -o ../app/libs/tunnel.aar .
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/27.2.12479018

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build APK
        run: |
          cd android
          echo "sdk.dir=$ANDROID_HOME" > local.properties
          gradle wrapper --gradle-version 8.11.1
          ./gradlew assembleDebug

      - name: Build server binary (linux amd64)
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -ldflags="-s -w" -o vkvpn-server ./server/

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: vkvpn-apk
          path: android/app/build/outputs/apk/**/*.apk

      - name: Upload server artifact
        uses: actions/upload-artifact@v4
        with:
          name: vkvpn-server
          path: vkvpn-server

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            android/app/build/outputs/apk/debug/*.apk
            vkvpn-server
