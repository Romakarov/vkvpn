name: Build APK

on:
  push:
    branches: [main, master, 'claude/**']
    paths:
      - 'android/**'
      - 'pkg/**'
      - '.github/workflows/build-apk.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.x'

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK
        run: sdkmanager "ndk;27.2.12479018"

      - name: Install gomobile
        run: |
          go install golang.org/x/mobile/cmd/gomobile@latest
          go install golang.org/x/mobile/cmd/gobind@latest
          gomobile init

      - name: Patch anet (fix go:linkname incompatibility)
        run: |
          cd android/tunnel
          go mod download github.com/wlynxg/anet@v0.0.5
          ANET_DIR=$(go env GOMODCACHE)/github.com/wlynxg/anet@v0.0.5
          PATCH_DIR=/tmp/anet-patched
          cp -r "$ANET_DIR" "$PATCH_DIR"
          chmod -R u+w "$PATCH_DIR"
          sed -i 's|//go:linkname zoneCache net.zoneCache|// patched: removed go:linkname|' "$PATCH_DIR/interface_android.go"
          sed -i 's|//go:linkname zoneCacheX golang.org/x/net/internal/socket.zoneCache|// patched: removed go:linkname|' "$PATCH_DIR/interface_android.go"
          echo "" >> go.mod
          echo "replace github.com/wlynxg/anet => /tmp/anet-patched" >> go.mod

      - name: Build Go tunnel library (.aar)
        run: |
          cd android/tunnel
          go mod tidy
          go get golang.org/x/mobile@latest
          mkdir -p ../app/libs
          gomobile bind -target=android/arm64,android/arm -androidapi 26 -o ../app/libs/tunnel.aar .
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/27.2.12479018

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build debug APK
        run: |
          cd android
          echo "sdk.dir=$ANDROID_HOME" > local.properties
          gradle wrapper --gradle-version 8.11.1
          ./gradlew assembleDebug

      - name: Copy APK to releases
        run: |
          mkdir -p releases
          cp android/app/build/outputs/apk/debug/app-debug.apk releases/vkvpn-debug.apk

      - name: Commit APK to releases/
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add releases/vkvpn-debug.apk
          git diff --cached --quiet && echo "No APK changes" || git commit -m "Build: update APK [skip ci]" && git push

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: vkvpn-apk
          path: releases/vkvpn-debug.apk
