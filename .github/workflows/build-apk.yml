name: Build APK

on:
  push:
    branches: [main, master]
    paths:
      - 'android/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK
        run: sdkmanager "ndk;27.2.12479018"

      - name: Install gomobile
        run: |
          go install golang.org/x/mobile/cmd/gomobile@latest
          go install golang.org/x/mobile/cmd/gobind@latest
          gomobile init

      - name: Build Go tunnel library (.aar)
        run: |
          cd android/tunnel
          go mod tidy
          mkdir -p ../app/libs
          gomobile bind -target=android/arm64,android/arm -androidapi 26 -o ../app/libs/tunnel.aar .
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/27.2.12479018

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew 2>/dev/null || true
          gradle wrapper --gradle-version 8.11.1 2>/dev/null || true
          ./gradlew assembleRelease || ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: vkvpn-apk
          path: android/app/build/outputs/apk/**/*.apk
