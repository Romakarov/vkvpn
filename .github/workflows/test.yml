name: Go Tests

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Run tests
        run: go test ./server/ ./pkg/... -v -race

      - name: Vet
        run: go vet ./server/ ./client/ ./pkg/...

      - name: Build server
        run: go build -o /tmp/vkvpn-server ./server/

      - name: Build client
        run: go build -o /tmp/vkvpn-client ./client/
