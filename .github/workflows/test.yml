name: Test & Build

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Run go vet
        run: go vet ./...

      - name: Run tests with race detector
        run: go test -race -v ./...

      - name: Build server
        run: go build -ldflags '-s -w' -trimpath -o /tmp/vkvpn-server ./server/

      - name: Build client
        run: go build -ldflags '-s -w' -trimpath -o /tmp/vkvpn-client ./client/
